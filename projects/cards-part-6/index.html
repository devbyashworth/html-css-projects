<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cards</title>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <img
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&q=80"
        alt="Random Image"
        class="image"
      />
      <div class="content">
        <h2>Card Title</h2>
        <h3>Economy</h3>
        <p>
          This is a description of the card. It provides more details about the
          content.
        </p>
        <a href="#" class="read-more">Read More</a>
        <div class="details">
          <span class="item">
            <span class="material-symbols-outlined"> sell </span>
            <em>from $120</em>
          </span>
          <span class="item">
            <span class="material-symbols-outlined"> travel </span>
            <em>BAN</em>
          </span>
        </div>
        <div class="buttons">
          <button type="button" class="primary-btn">Search flights</button>
          <button type="button" class="icon-btn">
            <span class="material-symbols-outlined"> favorite </span>
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
