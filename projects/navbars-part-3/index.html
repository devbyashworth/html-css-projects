<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <nav class="navbar">
      <button
        type="button"
        class="burger"
        onclick="document.body.classList.toggle('open')"
      ></button>

      <h1>BW</h1>

      <div class="dropdowns">
        <div class="dropdown">
          <button type="button">
            Services
            <img src="./arrow-left.png" />
          </button>

          <div class="dropdown-menu">
            <button>SEO Advice</button>
            <button>UX/UI Design</button>
            <button>Web Applications</button>
          </div>
        </div>

        <div class="dropdown">
          <button type="button">
            Products
            <img src="./arrow-left.png" />
          </button>

          <div class="dropdown-menu">
            <button>Security Course</button>
            <button>Learn CSS Ebook</button>
            <button>Masterclass Bundle</button>
          </div>
        </div>

        <div class="dropdown">
          <button type="button">
            Support
            <img src="./arrow-left.png" />
          </button>

          <div class="dropdown-menu">
            <button>Live Chat</button>
            <button>Send Email</button>
            <button>Request Help</button>
          </div>
        </div>
      </div>
    </nav>
  </body>
</html>
