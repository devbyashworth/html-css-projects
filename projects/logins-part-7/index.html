<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logins</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Material Symbols -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <!-- Font Awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <!-- Google Font -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
    />
  </head>
  <body>
    <div class="card">
      <input type="checkbox" name="toggle" id="toggle" class="toggle" />
      <div class="card-bg"></div>
      <div class="hero signup">
        <h2>Welcome Back!</h2>
        <p>Sign in to review your latest profit from investments.</p>
        <label for="toggle">SIGN IN</label>
      </div>
      <div class="form signup">
        <h2>Create Account</h2>
        <div class="socials">
          <i class="fa-brands fa-twitter"></i>
          <i class="fa-brands fa-facebook"></i>
          <i class="fa-brands fa-linkedin"></i>
        </div>
        <p>Or use your email address</p>
        <form action="#">
          <input type="text" name="fullName" placeholder="Full Name" />
          <input type="email" name="email" placeholder="Email Address" />
          <input type="password" name="password" placeholder="Password" />
          <button type="button" class="btn">SIGN UP</button>
        </form>
      </div>
      <div class="hero signin">
        <h2>Hey There!</h2>
        <p>Begin your journey using this software, and start earning now.</p>
        <label for="toggle">SIGN UP</label>
      </div>
      <div class="form signin">
        <h2>Sign In</h2>
        <div class="socials">
          <i class="fa-brands fa-twitter"></i>
          <i class="fa-brands fa-facebook"></i>
          <i class="fa-brands fa-linkedin"></i>
        </div>
        <p>Or use your email address</p>
        <form action="#">
          <input type="email" name="email" placeholder="Email Address" />
          <input type="password" name="password" placeholder="Password" />
          <a href="#">Forgot password?</a>
          <button type="button" class="btn">SIGN IN</button>
        </form>
      </div>
    </div>
  </body>
</html>
